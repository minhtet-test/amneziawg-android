name: Build Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Actions tab မှ ကိုယ်တိုင် Run နိုင်ရန်

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ၁။ Project ကုဒ်များကို ယူခြင်း
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ၂။ Java JDK ထည့်သွင်းခြင်း
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ၃။ gradlew ဖိုင်ကို Run နိုင်ရန် Permission ပေးခြင်း
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ၄။ Release APK ကို Gradle ဖြင့် တည်ဆောက်ခြင်း (Unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # ၅။ ထွက်လာသော APK ကို Keystore ဖြင့် Sign လုပ်ခြင်း
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ၆။ Sign လုပ်ပြီးသား APK ဖိုင်ကို GitHub တွင် သိမ်းဆည်းပေးခြင်း
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
