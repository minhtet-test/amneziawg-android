name: Build Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ၁။ Project ကုဒ်များကို ယူခြင်း (Submodule များ အားလုံးကိုပါ ယူရန် ပြင်ဆင်ထားသည်)
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # ၂။ Go Language ထည့်သွင်းခြင်း (WireGuard/Amnezia tunnel များအတွက် လိုအပ်ပါသည်)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20.0'

      # ၃။ Java JDK ထည့်သွင်းခြင်း
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ၄။ gradlew ဖိုင်ကို Run နိုင်ရန် Permission ပေးခြင်း
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ၅။ Release APK ကို တည်ဆောက်ခြင်း
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # ၆။ APK ကို Keystore ဖြင့် Sign လုပ်ခြင်း
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ၇။ Sign လုပ်ပြီးသား APK ဖိုင်ကို သိမ်းဆည်းခြင်း
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
